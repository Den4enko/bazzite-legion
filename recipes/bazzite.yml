name: bazzite-legion
base-image: ghcr.io/ublue-os/bazzite
image-version: stable
description: Custom Bazzite for Lenovo Legion Laptops

modules:
  - type: script
    scripts:
      - install-legion.sh

  - type: rpm-ostree
    install:
      - qemu-kvm
      - libvirt
      - edk2-ovmf
      - rclone

  - type: systemd
    system:
      enabled:
        - plasmavantage-noroot.service
