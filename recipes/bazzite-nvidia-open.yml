name: bazzite-legion-nvidia-open
base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: stable
description: Custom Bazzite (Nvidia Open) for Lenovo Legion Laptops

modules:
  - type: script
    scripts:
      - install-legion.sh

  - type: dnf
    repos:
      copr:
        - jhyub/supergfxctl-plasmoid
    install:
      packages:
        - qemu-kvm
        - libvirt
        - edk2-ovmf
        - supergfxctl-plasmoid

  - type: systemd
    system:
      enabled:
        - plasmavantage-noroot.service
